<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<title>ETHOS · Admin Panel</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
    body {
        background: #050505;
        color: #00ff00;
        font-family: Consolas, monospace;
        padding: 40px;
    }
    h1 { text-align: center; }
    .hidden { display: none; }
    input {
        background: #000;
        color: #00ff00;
        border: 1px solid #00ff00;
        padding: 6px;
        margin: 4px;
        width: 250px;
    }
    button {
        background: #00ff00;
        color: #000;
        border: none;
        padding: 6px 12px;
        cursor: pointer;
        font-weight: bold;
        margin: 4px;
    }
    table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
    }
    td, th {
        border: 1px solid #00ff00;
        padding: 8px;
        text-align: left;
    }
    .delete-btn { background: #ff0000; color: #fff; }
    .edit-btn { background: #00aaff; color: #000; }
</style>
</head>

<body>

<h1>ETHOS · Panell d'Administració</h1>

<!-- LOGIN -->
<div id="login">
    <p>Introdueix la contrasenya:</p>
    <input type="password" id="passwordInput">
    <button onclick="checkPassword()">Entrar</button>
</div>

<!-- PANEL -->
<div id="panel" class="hidden">

    <h2>Llista de jocs</h2>
    <table id="gamesTable">
        <tr>
            <th>Nom</th>
            <th>URL</th>
            <th>Categoria</th>
            <th>Accions</th>
        </tr>
    </table>

    <h2>Afegir joc</h2>
    <input id="newName" placeholder="Nom del joc">
    <input id="newURL" placeholder="URL del joc">
    <input id="newCategory" placeholder="Categoria">
    <button onclick="addGame()">Afegir</button>

</div>

<script>
/* ============================
      FIREBASE CONFIG
============================ */
const firebaseConfig = {
  apiKey: "AIzaSyBEtMYOTg4fBGyShbULdGCuW76nwlUIfiI",
  authDomain: "ethosgames-a1bc1.firebaseapp.com",
  projectId: "ethosgames-a1bc1",
  storageBucket: "ethosgames-a1bc1.firebasestorage.app",
  messagingSenderId: "877649560017",
  appId: "1:877649560017:web:598a7bc006323627ab60f0",
  measurementId: "G-4KKEY3PWQ5"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const PASSWORD = "Eric2881";

/* ============================
      LOGIN
============================ */
function checkPassword() {
    const input = document.getElementById("passwordInput").value;
    if (input === PASSWORD) {
        document.getElementById("login").classList.add("hidden");
        document.getElementById("panel").classList.remove("hidden");
        loadGames();
    } else {
        alert("Contrasenya incorrecta");
    }
}

/* ============================
      LOAD GAMES
============================ */
async function loadGames() {
    const table = document.getElementById("gamesTable");
    table.innerHTML = `
        <tr>
            <th>Nom</th>
            <th>URL</th>
            <th>Categoria</th>
            <th>Accions</th>
        </tr>
    `;

    const snapshot = await db.collection("games").orderBy("name").get();
    snapshot.forEach(doc => {
        const game = doc.data();
        const row = document.createElement("tr");
        row.innerHTML = `
            <td>${game.name}</td>
            <td>${game.url}</td>
            <td>${game.category}</td>
            <td>
                <button class="edit-btn" onclick="editGame('${doc.id}')">Editar</button>
                <button class="delete-btn" onclick="deleteGame('${doc.id}')">Eliminar</button>
            </td>
        `;
        table.appendChild(row);
    });
}

/* ============================
      ADD GAME
============================ */
async function addGame() {
    const name = document.getElementById("newName").value;
    const url = document.getElementById("newURL").value;
    const category = document.getElementById("newCategory").value;

    if (!name || !url || !category) return alert("Falten camps");

    await db.collection("games").add({ name, url, category });
    loadGames();
}

/* ============================
      DELETE GAME
============================ */
async function deleteGame(id) {
    await db.collection("games").doc(id).delete();
    loadGames();
}

/* ============================
      EDIT GAME
============================ */
async function editGame(id) {
    const doc = await db.collection("games").doc(id).get();
    const game = doc.data();

    const newName = prompt("Nou nom:", game.name);
    const newURL = prompt("Nou URL:", game.url);
    const newCategory = prompt("Nova categoria:", game.category);

    if (newName && newURL && newCategory) {
        await db.collection("games").doc(id).update({
            name: newName,
            url: newURL,
            category: newCategory
        });
        loadGames();
    }
}
</script>

</body>
</html>
