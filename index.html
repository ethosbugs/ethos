<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ETHOS TECHNOLOGIES V2.7 • ACCESS</title>

<style>
/* ================================ */
/*          GLOBAL + CRT FX         */
/* ================================ */

html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #000;
    color: #0f0;
    font-family: 'Courier New', monospace;
    overflow: hidden;
}

body {
    position: relative;
    animation: crtFlicker 0.12s infinite;
}

@keyframes crtFlicker {
    0% { opacity: 0.97; }
    50% { opacity: 1; }
    100% { opacity: 0.98; }
}

/* ================================ */
/*          INTRO SCREEN            */
/* ================================ */

#introScreen {
    position: absolute;
    inset: 0;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    letter-spacing: 2px;
    opacity: 1;
    transition: opacity 1.5s ease;
}

/* ================================ */
/*          LOGIN SCREEN            */
/* ================================ */

#loginScreen {
    position: absolute;
    inset: 0;
    background: #000;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

.loginEnter {
    animation: loginFade 1.2s ease forwards;
}

@keyframes loginFade {
    from { opacity: 0; }
    to { opacity: 1; }
}

#terminal {
    width: 80%;
    max-width: 600px;
    border: 2px solid #0f0;
    padding: 20px;
    font-size: 20px;
}

#fakeText {
    display: inline-block;
    min-height: 24px;
}

#realInput {
    position: absolute;
    opacity: 0;
    pointer-events: none;
}

/* ================================ */
/*          ALERT BOX               */
/* ================================ */

#alertBox {
    margin-top: 20px;
    font-size: 22px;
    opacity: 0;
    transition: opacity 0.3s ease;
}

.alert-red {
    color: #f00;
}

.alert-green {
    color: #0f0;
}

/* ================================ */
/*          ACCESS EFFECTS          */
/* ================================ */

.access-denied {
    animation: deniedFlash 0.2s steps(2) 4;
}

@keyframes deniedFlash {
    0% { background: #200; }
    100% { background: #000; }
}

.bigDenied {
    position: absolute;
    inset: 0;
    background: #000;
    color: #f00;
    font-size: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: bigDeniedFlash 0.8s steps(2) infinite;
}

@keyframes bigDeniedFlash {
    0% { opacity: 0.3; }
    100% { opacity: 1; }
}
</style>
</head>

<body>

<!-- ================================ -->
<!--          INTRO SCREEN            -->
<!-- ================================ -->

<div id="introScreen">INITIALIZING SYSTEM...</div>

<!-- ================================ -->
<!--          LOGIN SCREEN            -->
<!-- ================================ -->

<div id="loginScreen">
    <div id="terminal">
        <span>ENTER PASSWORD: </span><span id="fakeText"></span>
    </div>
    <input id="realInput" type="password" autocomplete="off" tabindex="0">
    <div id="alertBox"></div>
</div>

<!-- ================================ -->
<!--          BIG ACCESS DENIED       -->
<!-- ================================ -->

<div id="bigDenied" style="display:none;">ACCESS DENIED</div>

<script>
/* ================================ */
/*          INTRO → LOGIN           */
/* ================================ */

setTimeout(() => {
    const intro = document.getElementById('introScreen');
    const login = document.getElementById('loginScreen');

    intro.style.opacity = '0';

    setTimeout(() => {
        intro.style.display = 'none';
        login.style.display = 'flex';
        login.classList.add('loginEnter');
        realInput.focus();
    }, 1500);

}, 3000);

/* ================================ */
/*          LOGIN LOGIC             */
/* ================================ */

let errorCount = 0;
let locked = false;

const realInput = document.getElementById("realInput");
const fakeText = document.getElementById("fakeText");
const terminal = document.getElementById("terminal");
const alertBox = document.getElementById("alertBox");

realInput.addEventListener("input", () => {
    fakeText.textContent = "*".repeat(realInput.value.length);
});

realInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") verificar();
});

/* ================================ */
/*          ALERT SYSTEM            */
/* ================================ */

function showAlert(msg, color = "red") {
    alertBox.textContent = msg;
    alertBox.classList.remove("alert-red", "alert-green");
    alertBox.classList.add(color === "red" ? "alert-red" : "alert-green");
    alertBox.style.opacity = "1";

    setTimeout(() => {
        alertBox.style.opacity = "0";
    }, 1200);
}

/* ================================ */
/*          ACCESS GRANTED          */
/* ================================ */

function playAccessGranted(url) {
    showAlert("ACCESS GRANTED", "green");

    setTimeout(() => {
        window.location.href = url;
    }, 800);
}

/* ================================ */
/*          ACCESS DENIED BIG       */
/* ================================ */

function showAccessDeniedBig() {
    document.getElementById("bigDenied").style.display = "flex";
}

function lockSystem() {
    locked = true;
}

/* ================================ */
/*          VERIFY FUNCTION         */
/* ================================ */

function verificar() {
    if (locked) return;

    const clave = realInput.value.trim();

    if (!clave) {
        errorCount++;
        terminal.classList.add("access-denied");
        showAlert("EMPTY INPUT");

        realInput.value = "";
        fakeText.textContent = "";
        realInput.focus();

        if (errorCount >= 3) {
            showAccessDeniedBig();
            lockSystem();
        }

        setTimeout(() => terminal.classList.remove("access-denied"), 600);
        return;
    }

    const PASSWORD = "1234"; // ← CANVIA AQUI LA TEVA CONTRASENYA

    if (clave === PASSWORD) {
        playAccessGranted("ethos.html");
    } else {
        errorCount++;
        terminal.classList.add("access-denied");
        showAlert("WRONG PASSWORD");

        realInput.value = "";
        fakeText.textContent = "";
        realInput.focus();

        if (errorCount >= 3) {
            showAccessDeniedBig();
            lockSystem();
        }

        setTimeout(() => terminal.classList.remove("access-denied"), 600);
    }
}
</script>

</body>
</html>
