    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');
    const chars = '01アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789@#$%&*';
    const fontSize = 16;
    let drops = [];

    function resizeCanvas() {
      canvas.width = innerWidth;
      canvas.height = innerHeight;
      drops = Array(Math.floor(canvas.width / fontSize)).fill(1);
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    function getRainColor() {
      if (document.body.classList.contains("theme-red")) return "#ff0000";
      if (document.body.classList.contains("theme-blue")) return "#00aaff";
      return "#00ff00";
    }

    function drawMatrix() {
      ctx.fillStyle = 'rgba(0,0,0,0.04)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = getRainColor();
      ctx.font = fontSize + 'px Courier New';
      for (let i = 0; i < drops.length; i++) {
        const text = chars.charAt(Math.floor(Math.random() * chars.length));
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);
        if (drops[i] * fontSize > canvas.height && Math.random() > 0.985) drops[i] = 0;
        drops[i]++;
      }
    }
    setInterval(drawMatrix, 50);

    /* THEMES */
    let themeIndex = 0;
    const savedTheme = localStorage.getItem("ethos_theme");
    if (savedTheme !== null) {
      themeIndex = parseInt(savedTheme);
      if (themeIndex === 1) document.body.classList.add("theme-red");
      if (themeIndex === 2) document.body.classList.add("theme-blue");
    }
    function cycleTheme() {
      document.body.classList.remove("theme-red", "theme-blue");
      themeIndex = (themeIndex + 1) % 3;
      if (themeIndex === 1) document.body.classList.add("theme-red");
      if (themeIndex === 2) document.body.classList.add("theme-blue");
      localStorage.setItem("ethos_theme", themeIndex);

      { nombre: "Tiny Fishing", url: "https://legalizenuclearbombs5.github.io/games/Tiny%20Fishing", categoria: "DEPORTES" },
      { nombre: "Traffic Road", url: "https://azgames.io/traffic-road.embed", categoria: "MOTOR" },
      { nombre: "Trineo 3D", url: "https://gamea.azgame.io/slope-rider-3d/", categoria: "MOTOR" },
      { nombre: "Undead Corridor", url: "https://gamea.azgame.io/undead-corridor/", categoria: "TERROR" },
      { nombre: "Venge.io", url: "https://venge.io/", categoria: "ACCION" },
      { nombre: "Vex4", url: "https://ubg98.github.io/Vex4/", categoria: "PLATAFORMAS" },
      { nombre: "Tetris", url: "https://block-blast.io/block-blast.embed", categoria: "ARCADE" }
    ];

    let favoritos = JSON.parse(localStorage.getItem("ethos_favs")) || [];
    let currentCat = "ALL";

    const catBar = document.getElementById("catBar");
    const contenedor = document.getElementById("listaJuegos");
    const searchBar = document.getElementById("searchBar");

    function generarCategorias() {
      catBar.innerHTML = "";
      let finalTags = [];
      const extraTags = [...new Set(juegos.map(j => j.categoria))].sort();
      if (favoritos.length > 0) finalTags.push("FAVS");
      finalTags.push("ALL");
      finalTags = [...finalTags, ...extraTags];

      finalTags.forEach(tag => {
        const btn = document.createElement("button");
        btn.className = `cat-btn ${currentCat === tag ? "active" : ""}`;
        btn.dataset.cat = tag;
        btn.textContent = tag === "FAVS" ? "* FAVORITOS" : tag === "ALL" ? "SYSTEM_ALL" : tag;
        btn.onclick = () => {
          currentCat = tag;
          generarCategorias();
          mostrarJuegos(searchBar.value);
        };
        catBar.appendChild(btn);
      });
    }

    function mostrarJuegos(filtro = "") {
      contenedor.innerHTML = "";
      let filtrados = juegos.filter(j => {
        const matchSearch = j.nombre.toLowerCase().includes(filtro.toLowerCase());
        const matchCat = currentCat === "ALL" || 
                        (currentCat === "FAVS" ? favoritos.includes(j.nombre) : j.categoria === currentCat);
        return matchSearch && matchCat;
      });

      filtrados.sort((a, b) => a.nombre.localeCompare(b.nombre));

      filtrados.forEach(juego => {
        const div = document.createElement("div");
        div.className = "game-card";
        div.innerHTML = `
          <button class="btn-hacker" onclick="abrirJuego('${juego.url}')">
            > ${juego.nombre}
          </button>
          <button class="fav-star ${favoritos.includes(juego.nombre) ? "active" : ""}" 
                  onclick="toggleFav('${juego.nombre}', event)">★</button>
        `;
        contenedor.appendChild(div);
      });

      document.getElementById("counter").textContent = filtrados.length;
    }

    function abrirJuego(url) {
      const win = window.open("about:blank", "_blank");
      win.document.write(`
        <html><head><title>ETHOS — GAME MODE</title>
        <style>html,body{margin:0;padding:0;background:#000;overflow:hidden;height:100%;width:100%;}iframe{border:none;width:100vw;height:100vh;}</style>
        </head><body><iframe src="${url}" allowfullscreen></iframe></body></html>
      `);
      win.document.close();
    }

    function toggleFav(nombre, ev) {
      ev.stopPropagation();
      const idx = favoritos.indexOf(nombre);
      if (idx === -1) favoritos.push(nombre);
      else favoritos.splice(idx, 1);
      localStorage.setItem("ethos_favs", JSON.stringify(favoritos));
      generarCategorias();
      mostrarJuegos(searchBar.value);
    }

    /* RELOJ */
    function updateClock() {
      document.getElementById("clock").textContent = new Date().toLocaleTimeString("es-ES");
    }
    setInterval(updateClock, 1000);
    updateClock();

    /* BOTONES TOPBAR */
    function openEthosChat() {
      window.open("https://ethos-chat.vercel.app/", "_blank");
    }
    function openSpotify() {
      window.open("https://open.spotify.com/embed/playlist/4L7KXkQeIQpxWNdXMfBVSM?utm_source=generator&theme=0", "_blank");
    }

    // Inicializar
    generarCategorias();
    mostrarJuegos();

    // Búsqueda en tiempo real
    searchBar.addEventListener("input", () => mostrarJuegos(searchBar.value));
  </script>
</body>
</html>
