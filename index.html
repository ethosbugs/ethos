<script>
/* MATRIX */
const canvas = document.getElementById('matrix');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  canvas.width = innerWidth;
  canvas.height = innerHeight;
}
resizeCanvas();
addEventListener('resize', resizeCanvas);

const chars = '01アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789@#$%&*';
const fontSize = 14;
let columns = Math.floor(canvas.width / fontSize);
let drops = Array(columns).fill(1);

function drawMatrix() {
  ctx.fillStyle = 'rgba(5,5,5,0.05)';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = '#0f0';
  ctx.font = fontSize + 'px Courier New';

  for (let i=0;i<drops.length;i++) {
    const text = chars.charAt(Math.floor(Math.random()*chars.length));
    ctx.fillText(text, i*fontSize, drops[i]*fontSize);

    if (drops[i]*fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
    drops[i]++;
  }
}
setInterval(drawMatrix, 50);

let juegos = juegosRaw;

let favoritos = JSON.parse(localStorage.getItem("ethos_favs")) || [];
let currentCat = "ALL";

const catBar = document.getElementById("catBar");
const contenedor = document.getElementById("listaJuegos");
const searchBar = document.getElementById("searchBar");

/* CATEGORIES */
function generarCategorias() {
  catBar.innerHTML = "";
  let finalTags = [];

  const extraTags = [...new Set(juegos.map(j => j.categoria))].sort();

  if (favoritos.length > 0) finalTags.push("FAVS");
  finalTags.push("ALL");
  finalTags = [...finalTags, ...extraTags];

  finalTags.forEach(tag => {
    const btn = document.createElement("button");
    btn.className = `cat-btn ${currentCat === tag ? "active" : ""}`;
    btn.textContent =
      tag === "FAVS" ? "* FAVORITOS" :
      tag === "ALL" ? "SYSTEM_ALL" :
      tag;

    btn.onclick = () => {
      currentCat = tag;
      generarCategorias();
      mostrarJuegos(searchBar.value);
    };

    catBar.appendChild(btn);
  });
}

/* MOSTRAR JUEGOS */
function mostrarJuegos(filtro = "", animate = true) {
  contenedor.innerHTML = "";

  const filtrados = juegos.filter(j => {
    const matchSearch = j.nombre?.toLowerCase().includes(filtro.toLowerCase());
    const matchCat =
      currentCat === "ALL" ||
      (currentCat === "FAVS"
        ? favoritos.includes(j.nombre)
        : j.categoria === currentCat);

    return matchSearch && matchCat;
  });

  filtrados.forEach((juego, index) => {
    const div = document.createElement("div");
    div.className = "game-card" + (animate ? " animate" : "");
    div.style.animationDelay = `${Math.min(index * 0.03, 1.2)}s`;

    div.innerHTML = `
      <button class="btn-hacker" onclick="abrirJuego('${juego.url}')">
      <span>> ${juego.nombre}</span>
        </button>

      <button class="fav-star ${favoritos.includes(juego.nombre) ? "active" : ""}"
        onclick="toggleFav('${juego.nombre}', event)">
        ${favoritos.includes(juego.nombre) ? "★" : "☆"}
      </button>
    `;

    contenedor.appendChild(div);
  });

  document.getElementById("counter").textContent = filtrados.length;
}

/* FAVORITOS */
function toggleFav(nombre, e) {
  e.stopPropagation();

  favoritos = favoritos.includes(nombre)
    ? favoritos.filter(f => f !== nombre)
    : [...favoritos, nombre];

  localStorage.setItem("ethos_favs", JSON.stringify(favoritos));

  generarCategorias();
  mostrarJuegos(searchBar.value, false);
}

/* ABRIR JUEGO — SISTEMA ANTIC ETHOS */
function abrirJuego(url) {
  const win = window.open("about:blank", "_blank");

  win.document.write(`
    <html>
      <head>
        <title>ETHOS — GAME MODE</title>
        <style>
          html, body {
            margin: 0;
            padding: 0;
            background: #000;
            overflow: hidden;
            height: 100%;
            width: 100%;
          }
          iframe {
            border: none;
            width: 100vw;
            height: 100vh;
          }
        </style>
      </head>
      <body>
        <iframe src="${url}" allowfullscreen></iframe>
      </body>
    </html>
  `);

  win.document.close();
}

/* BUSCADOR */
searchBar.addEventListener("input", () => {
  mostrarJuegos(searchBar.value);
});

/* THEME */
let themeIndex = 0;
function cycleTheme() {
  document.body.classList.remove("theme-red", "theme-blue");

  themeIndex = (themeIndex + 1) % 3;

  if (themeIndex === 1) document.body.classList.add("theme-red");
  if (themeIndex === 2) document.body.classList.add("theme-blue");
}
