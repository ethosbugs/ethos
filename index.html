<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ETHOS TECHNOLOGIES V4.3</title>

  <style>
    /* ============================
          MATRIX BACKGROUND
    ============================ */
    #matrix {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: -1;
      pointer-events: none;
    }

    /* ============================
          GRID
    ============================ */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 22px;
      width: 100%;
      max-width: 1250px;
    }

    /* ============================
          SCROLLBAR
    ============================ */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #050505; }
    ::-webkit-scrollbar-thumb { background: #00ff00; border: 1px solid #003300; }
    ::-webkit-scrollbar-thumb:hover { background: #33ff33; }
    body.theme-red::-webkit-scrollbar-thumb { background: #ff0000; }
    body.theme-blue::-webkit-scrollbar-thumb { background: #00aaff; }

    /* ============================
          ANIMACIONS SIMPLES
    ============================ */

    @keyframes matrixReveal {
      0% { opacity: 0; transform: translateY(10px) scale(0.97); filter: blur(4px); }
      100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
    }

    @keyframes titleGlitch {
      0% { transform: skew(0deg); }
      20% { transform: skew(6deg); }
      22% { transform: skew(-6deg); }
      24% { transform: skew(0deg); }
      100% { transform: skew(0deg); }
    }

    @keyframes scanFlash {
      0% { opacity: 0; }
      10% { opacity: 0.8; }
      100% { opacity: 0; }
    }

    .theme-transition {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: linear-gradient(rgba(255,255,255,0.12), rgba(255,255,255,0));
      pointer-events: none;
      animation: scanFlash 0.25s ease-out;
      z-index: 999999;
    }

    /* ============================
          BODY
    ============================ */
    body {
      background: #050505;
      color: #00ff00;
      font-family: Consolas, monospace;
      margin: 0;
      padding: 82px 20px 70px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      animation: matrixReveal 0.5s ease-out;
    }

    body.theme-red { color: #ff0000; }
    body.theme-blue { color: #00aaff; }

    /* ============================
          TOPBAR
    ============================ */
    #ethos-topbar {
      position: fixed; top: 0; left: 0; right: 0;
      height: 66px;
      background: rgba(0,0,0,0.97);
      border-bottom: 3px solid currentColor;
      display: flex; align-items: center; gap: 18px;
      padding: 0 30px;
      z-index: 99999;
      animation: matrixReveal 0.6s ease forwards;
    }

    .top-btn {
      background: transparent;
      border: 1px solid currentColor;
      color: currentColor;
      padding: 12px 26px;
      font-size: 0.98rem;
      font-weight: bold;
      text-transform: uppercase;
      transition: 0.25s ease;
      opacity: 0.85;
    }

    .top-btn:hover {
      opacity: 1;
      box-shadow: 0 0 14px currentColor;
      transform: scale(0.96);
    }

    /* ============================
          TITLE
    ============================ */
    h1 {
      font-size: 2.6rem;
      letter-spacing: 7px;
      border-bottom: 3px solid currentColor;
      text-shadow: 0 0 15px currentColor;
      margin: 10px 0 25px 0;
      text-transform: uppercase;
      animation: matrixReveal 0.7s ease forwards;
    }

    h1:hover {
      animation: titleGlitch 0.25s linear;
    }

    /* ============================
          VPN NOTICE
    ============================ */
    .vpn-notice {
      color: currentColor;
      font-size: 1.2rem;
      margin-bottom: 32px;
      text-shadow: 0 0 8px currentColor;
      text-align: center;
      animation: matrixReveal 0.8s ease forwards;
    }

    /* ============================
          SEARCH
    ============================ */
    .search-wrapper { width: 100%; max-width: 650px; margin-bottom: 32px; }
    .search-container {
      border: 2.5px solid currentColor;
      padding: 16px 22px;
      background: rgba(0,0,0,0.9);
      animation: matrixReveal 0.9s ease forwards;
    }

    #searchBar {
      background: transparent;
      border: none;
      color: currentColor;
      outline: none;
      font-size: 1.15rem;
      width: 100%;
    }

    /* ============================
          CATEGORIES
    ============================ */
    .categories {
      display: flex; gap: 12px; margin-bottom: 40px;
      flex-wrap: wrap; justify-content: center;
      animation: matrixReveal 1s ease forwards;
    }

    .cat-btn {
      background: transparent;
      border: 1px solid currentColor;
      color: currentColor;
      padding: 6px 14px; 
      font-size: 0.75rem;
      transition: 0.25s ease;
      text-transform: uppercase;
      opacity: 0.7;
    }

    .cat-btn:hover {
      opacity: 1;
      box-shadow: 0 0 10px currentColor;
      transform: scale(0.96);
    }

    .cat-btn.active {
      opacity: 1;
      border-width: 2px;
      background: rgba(0,0,0,0.8);
    }

    /* ============================
          GAME CARDS
    ============================ */
    .game-card {
      position: relative;
      display: flex;
      opacity: 1;
    }

    .game-card.animate {
      animation: matrixReveal 0.4s ease forwards;
    }

    .btn-hacker {
      flex-grow: 1;
      background: transparent;
      border: 1px solid currentColor;
      color: currentColor;
      padding: 16px 20px;
      font-weight: bold;
      text-transform: uppercase;
      transition: 0.25s ease;
      text-align: left;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      cursor: pointer;
      font-size: 1.02rem;
    }

    .btn-hacker:hover {
      opacity: 1;
      box-shadow: 0 0 14px currentColor;
      transform: scale(0.96);
    }

    .fav-star {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      background: transparent; border: none;
      color: currentColor; font-size: 1.5rem;
      opacity: 0.7; cursor: pointer;
      transition: 0.25s ease;
    }

    .fav-star:hover { opacity: 1; transform: translateY(-50%) scale(1.25); }
    .fav-star.active { color: #ffff00; text-shadow: 0 0 12px #ffff00; }

    /* ============================
          STATUS BAR
    ============================ */
    .status-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 52px; padding: 0 30px;
      background: rgba(0,0,0,0.97);
      border-top: 3px solid currentColor;
      display: flex; justify-content: space-between; align-items: center;
      font-size: 0.84rem; z-index: 99999;
      animation: matrixReveal 1.1s ease forwards;
    }

    /* ============================
          ETHOS LOCK
    ============================ */
    #ethos-lock {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.96);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000000;
    }

    .lock-panel {
      border: 2px solid currentColor;
      padding: 26px 30px;
      max-width: 420px;
      width: 90%;
      background: rgba(0,0,0,0.9);
      box-shadow: 0 0 18px currentColor;
      text-align: center;
      animation: matrixReveal 0.4s ease-out;
    }

    .lock-title {
      font-size: 1.2rem;
      margin-bottom: 10px;
      letter-spacing: 4px;
    }

    .lock-sub {
      font-size: 0.85rem;
      opacity: 0.8;
      margin-bottom: 18px;
    }

    #lockInput {
      width: 100%;
      padding: 10px 12px;
      background: transparent;
      border: 1px solid currentColor;
      color: currentColor;
      font-family: inherit;
      font-size: 0.95rem;
      outline: none;
      margin-bottom: 12px;
    }

    #lockBtn {
      width: 100%;
      padding: 10px 12px;
      background: transparent;
      border: 1px solid currentColor;
      color: currentColor;
      font-weight: bold;
      text-transform: uppercase;
      cursor: pointer;
      transition: 0.2s ease;
    }

    #lockBtn:hover {
      box-shadow: 0 0 10px currentColor;
      transform: scale(0.97);
    }

    #lockError {
      margin-top: 10px;
      font-size: 0.8rem;
      color: #ff4444;
      min-height: 1em;
    }
  </style>
</head>

<body>
  <canvas id="matrix"></canvas>

  <!-- ETHOS LOCK -->
  <div id="ethos-lock">
    <div class="lock-panel">
      <div class="lock-title">[ ETHOS_SECURITY ]</div>
      <div class="lock-sub">ENTER MASTER PASSWORD TO CONTINUE</div>
      <input type="password" id="lockInput" placeholder="PASSWORD..." autocomplete="off">
      <button id="lockBtn">UNLOCK</button>
      <div id="lockError"></div>
    </div>
  </div>

  <div id="ethos-topbar">
    <button class="top-btn" onclick="openEthosAI()">[ ETHOS_AI ]</button>
    <button class="top-btn" onclick="openSpotify()">[ SPOTIFY ]</button>
    <button class="top-btn" onclick="cycleTheme()">[ THEME ]</button>
  </div>

  <h1>[ ETHOS_SYSTEM ]</h1>

  <div class="vpn-notice">
    JUEGOS BLOQUEADOS? — 
    <a href="#" style="color:currentColor; text-decoration:underline;">DESCARGAR FREEVPN</a>
  </div>

  <div class="search-wrapper">
    <div class="search-container">
      <input type="text" id="searchBar" placeholder="SYSTEM SEARCH ..." autocomplete="off">
    </div>
  </div>

  <div class="categories" id="catBar"></div>
  <div class="grid" id="listaJuegos"></div>

  <div class="status-bar">
    <div>NÚMERO DE JUEGOS: <span id="counter">0</span></div>
    <div><span id="clock">00:00:00</span></div>
    <div>v.236</div>
  </div>

  <script>
    /* ============================
          MATRIX BACKGROUND
    ============================ */
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');

    const chars = '01アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789@#$%&*';

    const fontSize = 16;
    let drops = [];

    function resizeCanvas() {
      canvas.width = innerWidth;
      canvas.height = innerHeight;
      drops = Array(Math.floor(canvas.width / fontSize)).fill(1);
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    function getRainColor() {
      if (document.body.classList.contains("theme-red")) return "#ff0000";
      if (document.body.classList.contains("theme-blue")) return "#00aaff";
      return "#00ff00";
    }

    function drawMatrix() {
      ctx.fillStyle = 'rgba(0,0,0,0.04)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = getRainColor();
      ctx.font = fontSize + 'px Courier New';

      for (let i = 0; i < drops.length; i++) {
        const text = chars.charAt(Math.floor(Math.random() * chars.length));
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        if (drops[i] * fontSize > canvas.height && Math.random() > 0.985) {
          drops[i] = 0;
        }

        drops[i]++;
      }
    }

    setInterval(drawMatrix, 50);

    /* ============================
          VARIABLES BASE
    ============================ */
    let juegos = [
      /* AQUI VAN TUS JUEGOS */
    ];

    let favoritos = JSON.parse(localStorage.getItem("ethos_favs")) || [];
    let currentCat = "ALL";

    const catBar = document.getElementById("catBar");
    const contenedor = document.getElementById("listaJuegos");
    const searchBar = document.getElementById("searchBar");

    /* ============================
          GENERAR CATEGORÍAS
    ============================ */
    function generarCategorias() {
      if (currentCat === "FAVS" && favoritos.length === 0) {
        currentCat = "ALL";
      }

      catBar.innerHTML = "";
      let finalTags = [];

      const extraTags = [...new Set(juegos.map(j => j.categoria))].sort();

      if (favoritos.length > 0) finalTags.push("FAVS");
      finalTags.push("ALL");
      finalTags = [...finalTags, ...extraTags];

      finalTags.forEach(tag => {
        const btn = document.createElement("button");

        btn.className = `cat-btn ${currentCat === tag ? "active" : ""}`;
        btn.dataset.cat = tag;

        btn.textContent =
          tag === "FAVS" ? "* FAVORITOS" :
          tag === "ALL" ? "SYSTEM_ALL" :
          tag;

        btn.onclick = (e) => {
          currentCat = e.target.dataset.cat;
          generarCategorias();
          mostrarJuegos(searchBar.value);
        };

        catBar.appendChild(btn);
      });
    }

    /* ============================
          MOSTRAR JUEGOS
    ============================ */
    function mostrarJuegos(filtro = "", animate = true) {
      contenedor.innerHTML = "";

      const visibles = Array.from(document.querySelectorAll(".cat-btn"))
                            .map(btn => btn.dataset.cat);

      if (!visibles.includes(currentCat)) {
        currentCat = "ALL";
      }

      let filtrados = juegos.filter(j => {
        const matchSearch = j.nombre.toLowerCase().includes(filtro.toLowerCase());
        const matchCat =
          currentCat === "ALL" ||
          (currentCat === "FAVS"
            ? favoritos.includes(j.nombre)
            : j.categoria === currentCat);

        return matchSearch && matchCat;
      });

      filtrados.sort((a, b) => a.nombre.localeCompare(b.nombre));

      filtrados.forEach((juego, index) => {
        const div = document.createElement("div");
        div.className = "game-card" + (animate ? " animate" : "");
        div.style.animationDelay = `${Math.min(index * 0.03, 1.2)}s`;

        div.innerHTML = `
          <button class="btn-hacker" onclick="abrirJuego('${juego.url}')">
            > ${juego.nombre}
          </button>
          <button class="fav-star ${favoritos.includes(juego.nombre) ? "active" : ""}"
                  onclick="toggleFav('${juego.nombre}', event)">
            ★
          </button>
        `;

        contenedor.appendChild(div);
      });

      document.getElementById("counter").textContent = filtrados.length;
    }

    /* ============================
          FAVORITOS
    ============================ */
