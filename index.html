<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ethos Technologies</title>
  <link rel="icon" type="image/png" href="https://cdn-1.webcatalog.io/catalog/hacker-typer/hacker-typer-icon.png">

  <!-- Firebase compat -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <style>
    /* MATRIX BACKGROUND */
    #matrix {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: -1;
      pointer-events: none;
    }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 22px;
      width: 100%;
      max-width: 1250px;
    }

    /* SCROLLBAR */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #050505; }
    ::-webkit-scrollbar-thumb { background: #00ff00; border: 1px solid #003300; }
    ::-webkit-scrollbar-thumb:hover { background: #33ff33; }
    body.theme-red::-webkit-scrollbar-thumb { background: #ff0000; }
    body.theme-blue::-webkit-scrollbar-thumb { background: #00aaff; }

    body {
      background: #050505;
      color: #00ff00;
      font-family: Consolas, monospace;
      margin: 0;
      padding: 82px 20px 70px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    body.theme-red { color: #ff0000; }
    body.theme-blue { color: #00aaff; }

    /* TOPBAR */
    #ethos-topbar {
      position: fixed; top: 0; left: 0; right: 0;
      height: 66px;
      background: rgba(0,0,0,0.97);
      border-bottom: 3px solid currentColor;
      display: flex; align-items: center; gap: 18px;
      padding: 0 30px;
      z-index: 99999;
    }

    .top-btn {
      background: transparent;
      border: 1px solid currentColor;
      color: currentColor;
      padding: 12px 26px;
      font-size: 0.98rem;
      font-weight: bold;
      text-transform: uppercase;
      transition: 0.25s ease;
      opacity: 0.85;
      cursor: pointer;
    }
    .top-btn:hover {
      opacity: 1;
      box-shadow: 0 0 14px currentColor;
      transform: scale(0.96);
    }

    /* TITLES */
    h1 {
      font-size: 2.6rem;
      letter-spacing: 7px;
      border-bottom: 3px solid currentColor;
      text-shadow: 0 0 15px currentColor;
      margin: 10px 0 25px 0;
      text-transform: uppercase;
    }

    .vpn-notice {
      color: currentColor;
      font-size: 1.2rem;
      margin-bottom: 32px;
      text-shadow: 0 0 8px currentColor;
      text-align: center;
    }
    .vpn-notice a { color: currentColor; }

    /* SEARCH BAR */
    .search-wrapper { width: 100%; max-width: 650px; margin-bottom: 32px; }
    .search-container {
      display: flex;
      border: 2.5px solid currentColor;
      background: rgba(0,0,0,0.9);
      overflow: hidden;
    }
    #searchBar {
      background: transparent;
      border: none;
      color: currentColor;
      outline: none;
      font-size: 1.15rem;
      padding: 16px 22px;
      flex: 1;
    }
    .search-btn {
      background: transparent;
      border: none;
      border-left: 2.5px solid currentColor;
      color: currentColor;
      padding: 0 28px;
      font-size: 1.5rem;
      cursor: pointer;
      transition: 0.25s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .search-btn:hover {
      background: rgba(0,255,0,0.08);
      box-shadow: 0 0 15px currentColor;
    }

    /* CATEGORIES */
    .categories {
      display: flex; gap: 12px; margin-bottom: 40px;
      flex-wrap: wrap; justify-content: center;
    }
    .cat-btn {
      background: transparent;
      border: 1px solid currentColor;
      color: currentColor;
      padding: 6px 14px;
      font-size: 0.75rem;
      transition: 0.25s ease;
      text-transform: uppercase;
      opacity: 0.7;
      cursor: pointer;
    }
    .cat-btn:hover {
      opacity: 1;
      box-shadow: 0 0 10px currentColor;
      transform: scale(0.96);
    }
    .cat-btn.active {
      opacity: 1;
      border-width: 2px;
      background: rgba(0,0,0,0.8);
    }

    /* GAME CARDS */
    .game-card {
      position: relative;
      display: flex;
    }
    .btn-hacker {
      flex-grow: 1;
      background: transparent;
      border: 1px solid currentColor;
      color: currentColor;
      padding: 16px 20px;
      font-weight: bold;
      text-transform: uppercase;
      transition: 0.25s ease;
      text-align: left;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      cursor: pointer;
      font-size: 1.02rem;
    }
    .btn-hacker:hover {
      box-shadow: 0 0 14px currentColor;
      transform: scale(0.96);
    }

    /* FAVORITE STAR */
    .fav-star {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: transparent;
      border: none;
      color: #888;
      font-size: 1.6rem;
      cursor: pointer;
      transition: 0.25s ease;
    }
    .fav-star:hover {
      transform: translateY(-50%) scale(1.25);
      color: #fff;
    }
    .fav-star.active {
      color: #ffff00;
      text-shadow: 0 0 12px #ffff00;
    }

    /* STATUS BAR */
    .status-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 52px; padding: 0 30px;
      background: rgba(0,0,0,0.97);
      border-top: 3px solid currentColor;
      display: flex; justify-content: space-between; align-items: center;
      font-size: 0.84rem; z-index: 99999;
    }
  </style>
</head>

<body>
  <canvas id="matrix"></canvas>

  <!-- TOPBAR -->
  <div id="ethos-topbar">
    <button class="top-btn" onclick="openEthosChat()">[ ETHOS_CHAT ]</button>
    <button class="top-btn" onclick="openSpotify()">[ SPOTIFY ]</button>
    <button class="top-btn" onclick="window.location.href='admin.html'">[ ADMIN ]</button>
    <button class="top-btn" onclick="cycleTheme()">[ THEME ]</button>
  </div>

  <h1>[ GAME SECTION ]</h1>

  <div class="vpn-notice">
    JUEGOS BLOQUEADOS? — 
    <a href="https://chromewebstore.google.com/detail/free-vpn-for-chrome-vpn-p/majdfhpaihoncoakbjgbdhglocklcgno" target="_blank">DESCARGAR FREEVPN</a>
  </div>

  <!-- SEARCH -->
  <div class="search-wrapper">
    <div class="search-container">
      <input type="text" id="searchBar" placeholder="SYSTEM SEARCH ..." autocomplete="off"
             oninput="mostrarJuegos(this.value)">
      <button class="search-btn">⟡</button>
    </div>
  </div>

  <!-- CATEGORIES -->
  <div class="categories" id="catBar"></div>

  <!-- GAME GRID -->
  <div class="grid" id="listaJuegos"></div>

  <!-- STATUS BAR -->
  <div class="status-bar">
    <div>NÚMERO DE JUEGOS: <span id="counter">0</span></div>
    <div><span id="clock">00:00:00</span></div>
    <div>v.236</div>
  </div>

<script>
/* MATRIX BACKGROUND */
const canvas = document.getElementById('matrix');
const ctx = canvas.getContext('2d');
const chars = '01アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789@#$%&*';
const fontSize = 16;
let drops = [];

function resizeCanvas() {
  canvas.width = innerWidth;
  canvas.height = innerHeight;
  drops = Array(Math.floor(canvas.width / fontSize)).fill(1);
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function getRainColor() {
  if (document.body.classList.contains("theme-red")) return "#ff0000";
  if (document.body.classList.contains("theme-blue")) return "#00aaff";
  return "#00ff00";
}

function drawMatrix() {
  ctx.fillStyle = 'rgba(0,0,0,0.04)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = getRainColor();
  ctx.font = fontSize + 'px Courier New';
  for (let i = 0; i < drops.length; i++) {
    const text = chars.charAt(Math.floor(Math.random() * chars.length));
    ctx.fillText(text, i * fontSize, drops[i] * fontSize);
    if (drops[i] * fontSize > canvas.height && Math.random() > 0.985) drops[i] = 0;
    drops[i]++;
  }
}
setInterval(drawMatrix, 50);

/* THEMES */
let themeIndex = 0;
const savedTheme = localStorage.getItem("ethos_theme");
if (savedTheme !== null) {
  themeIndex = parseInt(savedTheme);
  if (themeIndex === 1) document.body.classList.add("theme-red");
  if (themeIndex === 2) document.body.classList.add("theme-blue");
}
function cycleTheme() {
  document.body.classList.remove("theme-red", "theme-blue");
  themeIndex = (themeIndex + 1) % 3;
  if (themeIndex === 1) document.body.classList.add("theme-red");
  if (themeIndex === 2) document.body.classList.add("theme-blue");
  localStorage.setItem("ethos_theme", themeIndex);
}

/* FIREBASE INIT */
const firebaseConfig = {
  apiKey: "AIzaSyBEtMYOTg4fBGyShbULdGCuW76nwlUIfiI",
  authDomain: "ethosgames-a1bc1.firebaseapp.com",
  projectId: "ethosgames-a1bc1",
  storageBucket: "ethosgames-a1bc1.firebasestorage.app",
  messagingSenderId: "877649560017",
  appId: "1:877649560017:web:598a7bc006323627ab60f0",
  measurementId: "G-4KKEY3PWQ5"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* FAVORITS */
let favs = JSON.parse(localStorage.getItem("ethos_favs") || "[]");

function toggleFav(name) {
  if (favs.includes(name)) {
    favs = favs.filter(f => f !== name);
  } else {
    favs.push(name);
  }
  localStorage.setItem("ethos_favs", JSON.stringify(favs));
  mostrarJuegos(document.getElementById("searchBar").value);
}

/* FIRESTORE REALTIME */
let juegos = [];
let categoriaActual = "ALL";

db.collection("games").onSnapshot(snapshot => {
  juegos = [];
  snapshot.forEach(doc => juegos.push(doc.data()));
  generarCategorias();
  mostrarJuegos(document.getElementById("searchBar").value);
});

/* CATEGORIES */
function generarCategorias() {
  const catBar = document.getElementById("catBar");
  catBar.innerHTML = "";

  const categories = ["ALL", "FAVS", ...new Set(juegos.map(j => (j.category || "").toUpperCase()))];

  categories.forEach(cat => {
    const btn = document.createElement("button");
    btn.className = "cat-btn";
    btn.textContent = cat;
    btn.onclick = () => {
      categoriaActual = cat;
      document.querySelectorAll(".cat-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      mostrarJuegos(document.getElementById("searchBar").value);
    };
    if (cat === "ALL") btn.classList.add("active");
    catBar.appendChild(btn);
  });
}

/* SHOW GAMES */
function mostrarJuegos(filtro = "") {
  const lista = document.getElementById("listaJuegos");
  lista.innerHTML = "";

  const ordenats = [...juegos].sort((a, b) => (a.name || "").localeCompare(b.name || ""));

  const filtrats = ordenats.filter(j => {
    const matchCat =
      categoriaActual === "ALL" ||
      (categoriaActual === "FAVS" && favs.includes(j.name)) ||
      (j.category || "").toUpperCase() === categoriaActual;

    return matchCat && (j.name || "").toLowerCase().includes(filtro.toLowerCase());
  });

  document.getElementById("counter").textContent = filtrats.length;

  filtrats.forEach(juego => {
    const card = document.createElement("div");
    card.className = "game-card";

    const isFav = favs.includes(juego.name);

    card.innerHTML = `
      <button class="btn-hacker" onclick="abrirJuego('${juego.url}')">> ${juego.name}</button>
      <button class="fav-star ${isFav ? "active" : ""}" onclick="toggleFav('${juego.name}')">
        ${isFav ? "⭐" : "☆"}
      </button>
    `;

    lista.appendChild(card);
  });
}

/* OPEN GAME */
function abrirJuego(url) {
  const win = window.open("about:blank", "_blank");
  win.document.write(`
    <style>
      body { margin:0; background:#000; }
      iframe { width:100vw; height:100vh; border:none; }
    </style>
    <iframe src="${url}"></iframe>
  `);
}

/* CLOCK */
setInterval(() => {
  const now = new Date();
  document.getElementById("clock").textContent =
    now.toLocaleTimeString("es-ES");
}, 1000);

/* TOPBAR BUTTONS */
function openEthosChat() {
  window.location.href = "https://ethos-chat.vercel.app/";
}
function openSpotify() {
  window.location.href = "https://open.spotify.com/embed/playlist/4L7KXkQeIQpxWNdXMfBVSM?utm_source=generator&theme=0";
}
</script>

</body>
</html>
