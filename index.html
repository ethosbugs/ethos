<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- TÍTOL I ICONA -->
  <title>Ethos Technologies</title>
  <link rel="icon" type="image/png" href="https://cdn-1.webcatalog.io/catalog/hacker-typer/hacker-typer-icon.png">
  <style>
    /* ============================
          MATRIX BACKGROUND
    ============================ */
    #matrix {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: -1;
      pointer-events: none;
    }
    /* ============================
          GRID
    ============================ */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 22px;
      width: 100%;
      max-width: 1250px;
    }
    /* ============================
      SCROLLBAR (CANVIS DE COLOR)
    ============================ */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #050505; }
    ::-webkit-scrollbar-thumb { background: #00ff00; border: 1px solid #003300; }
    ::-webkit-scrollbar-thumb:hover { background: #33ff33; }
    body.theme-red::-webkit-scrollbar-thumb { background: #ff0000; }
    body.theme-blue::-webkit-scrollbar-thumb { background: #00aaff; }
    body {
      background: #050505;
      color: #00ff00;
      font-family: Consolas, monospace;
      margin: 0;
      padding: 82px 20px 70px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    body.theme-red { color: #ff0000; }
    body.theme-blue { color: #00aaff; }
    /* ============================
          TOPBAR
    ============================ */
    #ethos-topbar {
      position: fixed; top: 0; left: 0; right: 0;
      height: 66px;
      background: rgba(0,0,0,0.97);
      border-bottom: 3px solid currentColor;
      display: flex; align-items: center; gap: 18px;
      padding: 0 30px;
      z-index: 99999;
    }
    .top-btn {
      background: transparent;
      border: 1px solid currentColor;
      color: currentColor;
      padding: 12px 26px;
      font-size: 0.98rem;
      font-weight: bold;
      text-transform: uppercase;
      transition: 0.25s ease;
      opacity: 0.85;
    }
    .top-btn:hover {
      opacity: 1;
      box-shadow: 0 0 14px currentColor;
      transform: scale(0.96);
    }
    /* ============================
          TÍTOL
    ============================ */
    h1 {
      font-size: 2.6rem;
      letter-spacing: 7px;
      border-bottom: 3px solid currentColor;
      text-shadow: 0 0 15px currentColor;
      margin: 10px 0 25px 0;
      text-transform: uppercase;
    }
    /* ============================
          VPN (AVÍS)
    ============================ */
    .vpn-notice {
      color: currentColor;
      font-size: 1.2rem;
      margin-bottom: 32px;
      text-shadow: 0 0 8px currentColor;
      text-align: center;
    }
    /* ============================
          BUSCAR (MEJORADO CON BOTÓN)
    ============================ */
    .search-wrapper { 
      width: 100%; 
      max-width: 650px; 
      margin-bottom: 32px; 
    }
    .search-container {
      display: flex;
      border: 2.5px solid currentColor;
      background: rgba(0,0,0,0.9);
      overflow: hidden;
    }
    #searchBar {
      background: transparent;
      border: none;
      color: currentColor;
      outline: none;
      font-size: 1.15rem;
      padding: 16px 22px;
      flex: 1;
    }
    .search-btn {
      background: transparent;
      border: none;
      border-left: 2.5px solid currentColor;
      color: currentColor;
      padding: 0 28px;
      font-size: 1.4rem;
      cursor: pointer;
      transition: 0.25s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .search-btn:hover {
      background: rgba(0,255,0,0.1);
      box-shadow: 0 0 15px currentColor;
    }
    /* ============================
          CATEGORIES
    ============================ */
    .categories {
      display: flex; gap: 12px; margin-bottom: 40px;
      flex-wrap: wrap; justify-content: center;
    }
    .cat-btn {
      background: transparent;
      border: 1px solid currentColor;
      color: currentColor;
      padding: 6px 14px;
      font-size: 0.75rem;
      transition: 0.25s ease;
      text-transform: uppercase;
      opacity: 0.7;
    }
    .cat-btn:hover {
      opacity: 1;
      box-shadow: 0 0 10px currentColor;
      transform: scale(0.96);
    }
    .cat-btn.active {
      opacity: 1;
      border-width: 2px;
      background: rgba(0,0,0,0.8);
    }
    .game-card {
      position: relative;
      display: flex;
      opacity: 1;
    }
    .btn-hacker {
      flex-grow: 1;
      background: transparent;
      border: 1px solid currentColor;
      color: currentColor;
      padding: 16px 20px;
      font-weight: bold;
      text-transform: uppercase;
      transition: 0.25s ease;
      text-align: left;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      cursor: pointer;
      font-size: 1.02rem;
    }
    .btn-hacker:hover {
      opacity: 1;
      box-shadow: 0 0 14px currentColor;
      transform: scale(0.96);
    }
    .fav-star {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      background: transparent; border: none;
      color: currentColor; font-size: 1.5rem;
      opacity: 0.7; cursor: pointer;
      transition: 0.25s ease;
    }
    .fav-star:hover { opacity: 1; transform: translateY(-50%) scale(1.25); }
    .fav-star.active { color: #ffff00; text-shadow: 0 0 12px #ffff00; }
    .status-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 52px; padding: 0 30px;
      background: rgba(0,0,0,0.97);
      border-top: 3px solid currentColor;
      display: flex; justify-content: space-between; align-items: center;
      font-size: 0.84rem; z-index: 99999;
    }
  </style>
</head>
<body>
  <canvas id="matrix"></canvas>
  <div id="ethos-topbar">
    <button class="top-btn" onclick="openEthosChat()">[ ETHOS_CHAT ]</button>
    <button class="top-btn" onclick="openSpotify()">[ SPOTIFY ]</button>
    <button class="top-btn" onclick="cycleTheme()">[ THEME ]</button>
  </div>
  <h1>[ GAME SECTION ]</h1>
  <div class="vpn-notice">
  JUEGOS BLOQUEADOS? —
  <a
    href="https://chromewebstore.google.com/detail/free-vpn-for-chrome-vpn-p/majdfhpaihoncoakbjgbdhglocklcgno"
    target="_blank"
    class="vpn-link"
  >
    DESCARGAR FREEVPN
  </a>
</div>

  <!-- BUSCADOR CON BOTÓN -->
  <div class="search-wrapper">
    <div class="search-container">
      <input type="text" id="searchBar" placeholder="SYSTEM SEARCH ..." autocomplete="off">
      <button class="search-btn" onclick="document.getElementById('searchBar').focus(); mostrarJuegos(document.getElementById('searchBar').value, false);">⟡</button>
    </div>
  </div>

  <div class="categories" id="catBar"></div>
  <div class="grid" id="listaJuegos"></div>

  <div class="status-bar">
    <div>NÚMERO DE JUEGOS: <span id="counter">0</span></div>
    <div><span id="clock">00:00:00</span></div>
    <div>v.236</div>
  </div>

  <script>
    /* ============================
          MATRIX FONS
    ============================ */
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');
    const chars = '01アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789@#$%&*';
    const fontSize = 16;
    let drops = [];
    function resizeCanvas() {
      canvas.width = innerWidth;
      canvas.height = innerHeight;
      drops = Array(Math.floor(canvas.width / fontSize)).fill(1);
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);
    function getRainColor() {
      if (document.body.classList.contains("theme-red")) return "#ff0000";
      if (document.body.classList.contains("theme-blue")) return "#00aaff";
      return "#00ff00";
    }
    function drawMatrix() {
      ctx.fillStyle = 'rgba(0,0,0,0.04)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = getRainColor();
      ctx.font = fontSize + 'px Courier New';
      for (let i = 0; i < drops.length; i++) {
        const text = chars.charAt(Math.floor(Math.random() * chars.length));
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);
        if (drops[i] * fontSize > canvas.height && Math.random() > 0.985) {
          drops[i] = 0;
        }
        drops[i]++;
      }
    }
    setInterval(drawMatrix, 50);

    /* ============================
          TEMES (MEMÒRIA)
    ============================ */
    let themeIndex = 0;
    const savedTheme = localStorage.getItem("ethos_theme");
    if (savedTheme !== null) {
      themeIndex = parseInt(savedTheme);
      if (themeIndex === 1) document.body.classList.add("theme-red");
      if (themeIndex === 2) document.body.classList.add("theme-blue");
    }
    function cycleTheme() {
      document.body.classList.remove("theme-red", "theme-blue");
      themeIndex = (themeIndex + 1) % 3;
      if (themeIndex === 1) document.body.classList.add("theme-red");
      if (themeIndex === 2) document.body.classList.add("theme-blue");
      localStorage.setItem("ethos_theme", themeIndex);
    }

    /* ============================
          FUNCIONS JOCS (IFRAME)
    ============================ */
    function abrirJuego(url) {
      const win = window.open("about:blank", "_blank");
      win.document.write(`
        <html>
          <head>
            <title>ETHOS — GAME MODE</title>
            <style>
              html, body {
                margin: 0;
                padding: 0;
                background: #000;
                overflow: hidden;
                height: 100%;
                width: 100%;
              }
              iframe {
                border: none;
                width: 100vw;
                height: 100vh;
              }
            </style>
          </head>
          <body>
            <iframe src="${url}" allowfullscreen></iframe>
          </body>
        </html>
      `);
      win.document.close();
    }

    function toggleFav(nombre, ev) {
      ev.stopPropagation();
      const idx = favoritos.indexOf(nombre);
      if (idx === -1) {
        favoritos.push(nombre);
      } else {
        favoritos.splice(idx, 1);
      }
      localStorage.setItem("ethos_favs", JSON.stringify(favoritos));
      mostrarJuegos(document.getElementById("searchBar").value, false);
    }

    /* ============================
          JOCS
    ============================ */
    let juegos = [ /* ... tu lista de juegos se mantiene exactamente igual ... */ 
      // (No la copio completa aquí para ahorrar espacio, pero está igual que en tu código original)
    ];
   
    let favoritos = JSON.parse(localStorage.getItem("ethos_favs")) || [];
    let currentCat = "ALL";
    const catBar = document.getElementById("catBar");
    const contenedor = document.getElementById("listaJuegos");
    const searchBar = document.getElementById("searchBar");

    // ... (el resto del script se mantiene exactamente igual: generarCategorias, mostrarJuegos, updateClock, etc.)

    function generarCategorias() {
      catBar.innerHTML = "";
      let finalTags = [];
      const extraTags = [...new Set(juegos.map(j => j.categoria))].sort();
      if (favoritos.length > 0) finalTags.push("FAVS");
      finalTags.push("ALL");
      finalTags = [...finalTags, ...extraTags];
      finalTags.forEach(tag => {
        const btn = document.createElement("button");
        btn.className = `cat-btn ${currentCat === tag ? "active" : ""}`;
        btn.dataset.cat = tag;
        btn.textContent =
          tag === "FAVS" ? "* FAVORITOS" :
          tag === "ALL" ? "SYSTEM_ALL" :
          tag;
        btn.onclick = (e) => {
          currentCat = e.target.dataset.cat;
          generarCategorias();
          mostrarJuegos(searchBar.value, false);
        };
        catBar.appendChild(btn);
      });
    }

    function mostrarJuegos(filtro = "", animate = false) {
      contenedor.innerHTML = "";
      let filtrados = juegos.filter(j => {
        const matchSearch = j.nombre.toLowerCase().includes(filtro.toLowerCase());
        const matchCat =
          currentCat === "ALL" ||
          (currentCat === "FAVS"
            ? favoritos.includes(j.nombre)
            : j.categoria === currentCat);
        return matchSearch && matchCat;
      });
      filtrados.sort((a, b) => a.nombre.localeCompare(b.nombre));
      filtrados.forEach((juego) => {
        const div = document.createElement("div");
        div.className = "game-card";
        div.innerHTML = `
          <button class="btn-hacker" onclick="abrirJuego('${juego.url}')">
            > ${juego.nombre}
          </button>
          <button class="fav-star ${favoritos.includes(juego.nombre) ? "active" : ""}"
                  onclick="toggleFav('${juego.nombre}', event)">
            ★
          </button>
        `;
        contenedor.appendChild(div);
      });
      document.getElementById("counter").textContent = filtrados.length;
    }

    /* ============================
          RELLOTGE
    ============================ */
    function updateClock() {
      document.getElementById("clock").textContent =
        new Date().toLocaleTimeString("es-ES");
    }
    setInterval(updateClock, 1000);
    updateClock();

    /* ============================
          TOPBAR (BOTONS)
    ============================ */
    function openEthosChat() {
      window.open("https://ethos-chat.vercel.app/", "_blank");
    }
    function openSpotify() {
      window.open("https://open.spotify.com/embed/playlist/4L7KXkQeIQpxWNdXMfBVSM?utm_source=generator&theme=0", "_blank");
    }

    // Inicialización
    generarCategorias();
    mostrarJuegos();

    // Búsqueda en tiempo real (mantengo el comportamiento original)
    searchBar.addEventListener("input", () => {
      mostrarJuegos(searchBar.value, false);
    });
  </script>
</body>
</html>
