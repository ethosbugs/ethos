// Ordenar juegos alfabéticamente
const juegos = juegosRaw.sort((a, b) => a.nombre.localeCompare(b.nombre));

const contenedor = document.getElementById("listaJuegos");
const searchBar = document.getElementById("searchBar");
const catBar = document.getElementById("catBar");

let currentCat = "ALL";
let favoritos = JSON.parse(localStorage.getItem("ethos_favs")) || [];

/* FAVORITOS */
function toggleFav(nombre, e) {
  e.stopPropagation();

  favoritos = favoritos.includes(nombre)
    ? favoritos.filter(f => f !== nombre)
    : [...favoritos, nombre];

  localStorage.setItem("ethos_favs", JSON.stringify(favoritos));

  generarCategorias();
  mostrarJuegos(searchBar.value, false);
}

/* CATEGORÍAS */
function generarCategorias() {
  catBar.innerHTML = "";
  let finalTags = [];

  const extraTags = [...new Set(juegos.map(j => j.tag))].sort();

  if (favoritos.length > 0) finalTags.push("FAVS");

  finalTags.push("ALL");
  finalTags = [...finalTags, ...extraTags];

  finalTags.forEach(tag => {
    const btn = document.createElement("button");
    btn.className = `cat-btn ${currentCat === tag ? "active" : ""}`;

    btn.textContent =
      tag === "FAVS" ? "* FAVORITOS" :
      tag === "ALL" ? "SYSTEM_ALL" :
      tag;

    btn.onclick = () => {
      currentCat = tag;
      generarCategorias();
      mostrarJuegos(searchBar.value);
    };

    catBar.appendChild(btn);
  });
}

/* MOSTRAR JUEGOS */
function mostrarJuegos(filtro = "", animate = true) {
  contenedor.innerHTML = "";

  const filtrados = juegos.filter(j => {
    const matchSearch = j.nombre.toLowerCase().includes(filtro.toLowerCase());
    const matchCat =
      currentCat === "ALL" ||
      (currentCat === "FAVS"
        ? favoritos.includes(j.nombre)
        : j.tag === currentCat);

    return matchSearch && matchCat;
  });

  filtrados.forEach((juego, index) => {
    const div = document.createElement("div");
    div.className = "game-card" + (animate ? " animate" : "");

    if (animate) {
      div.style.animationDelay = `${Math.min(index * 0.03, 1.2)}s`;
    } else {
      div.style.opacity = "1";
    }

 div.innerHTML = `
    <div class="game-card">
        <img src="${juego.logo}" class="game-logo">

        <div class="game-info">
            <span class="game-name">${juego.nombre}</span>
        </div>

        <button class="fav-star ${favoritos.includes(juego.nombre) ? 'active' : ''}"
            onclick="toggleFav('${juego.nombre}', event)">
            ${favoritos.includes(juego.nombre) ? '★' : '☆'}
        </button>

        <button class="play-btn" onclick="abrirJuego('${juego.url}')">
            PLAY
        </button>
    </div>
`;

    contenedor.appendChild(div);
  });

  document.getElementById("counter").textContent = filtrados.length;
}

/* ABRIR JUEGO */
function abrirJuego(url) {
  const win = window.open("about:blank", "_blank");
  const content = `
    <html>
    <head>
      <title>ETHOS_SYSTEM</title>
      <style>
        body, html { margin:0; padding:0; height:100vh; overflow:hidden; background:#000; }
        iframe { border:0; width:100%; height:100%; }
      </style>
    </head>
    <body>
      <iframe src="${url.trim()}" allowfullscreen></iframe>
    </body>
    </html>
  `;
  win.document.write(content);
  win.document.close();
}
