/* MATRIX BACKGROUND */
.matrix-bg {
    position: fixed;
    inset: 0;
    background-image: url('https://i.imgur.com/5c1ZQKX.gif');
    background-size: cover;
    opacity: 0.15;
    z-index: -1;

/* HEADER */
.header {
    text-align: center;
    padding: 20px;
    font-size: 26px;
    color: #0f0;
}

/* SEARCH BAR */
.search-box {
    width: 80%;
    margin: 0 auto;
    text-align: center;
}

.search-box input {
    width: 60%;
    padding: 10px;
    background: #000;
    border: 2px solid #0f0;
    color: #0f0;
    font-size: 18px;
}

/* CATEGORY BUTTONS */
.categories {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
    padding: 15px;
}

.cat-btn {
    border: 1px solid #0f0;
    padding: 8px 15px;
    cursor: pointer;
    background: transparent;
    color: #0f0;
    transition: 0.2s;
}

.cat-btn:hover {
    background: #0f0;
    color: #000;
}

/* GAMES GRID */
.games-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    justify-content: center;
    padding: 20px;
}

/* GAME CARD */
.game-card {
    background: rgba(0,255,0,0.05);
    border: 1px solid #0f0;
    padding: 10px;
    width: 180px;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    transition: 0.2s;
}

.game-card:hover {
    background: rgba(0,255,0,0.15);
    transform: scale(1.03);
}

.game-logo {
    width: 100px;
    height: 100px;
    object-fit: contain;
    margin-bottom: 10px;
}

.game-name {
    font-size: 16px;
    color: #0f0;
    text-align: center;
}

.fav-star {
    position: absolute;
    top: 5px;
    right: 5px;
    background: transparent;
    border: none;
    font-size: 22px;
    cursor: pointer;
    color: #0f0;
}

.fav-star.active {
    color: yellow;
}

.play-btn {
    margin-top: 10px;
    background: #0f0;
    color: #000;
    border: none;
    padding: 5px 15px;
    cursor: pointer;
    font-weight: bold;
}

/* FOOTER */
.footer {
    text-align: center;
    padding: 20px;
    color: #0f0;
}
</style>

  { nombre: "Undead Corridor", url: "https://gamea.azgame.io/undead-corridor/", tag: "TERROR", logo: "https://example.com/logo-undead-corridor.png" },
  { nombre: "Venge.io", url: "https://venge.io/", tag: "ACCION", logo: "https://example.com/logo-venge-io.png" },
  { nombre: "Vex4", url: "https://ubg98.github.io/Vex4/", tag: "PLATAFORMAS", logo: "https://example.com/logo-vex4.png" },
  { nombre: "Tetris", url: "https://block-blast.io/block-blast.embed", tag: "ARCADE", logo: "https://example.com/logo-tetris.png" }
];

/* FAVORITOS */
let favoritos = JSON.parse(localStorage.getItem("favoritosETHOS")) || [];

function toggleFav(nombre, event) {
    event.stopPropagation();

    if (favoritos.includes(nombre)) {
        favoritos = favoritos.filter(f => f !== nombre);
    } else {
        favoritos.push(nombre);
    }

    localStorage.setItem("favoritosETHOS", JSON.stringify(favoritos));
    renderJuegos();
}

/* OBRIR JOC */
function abrirJuego(url) {
    window.open(url, "_blank");
}

/* RENDER PRINCIPAL */
function renderJuegos(lista = juegosRaw) {
    const cont = document.getElementById("gamesContainer");
    cont.innerHTML = "";

    lista.forEach(juego => {
        const div = document.createElement("div");
        div.className = "game-card";

        div.innerHTML = `
            <img src="${juego.logo}" class="game-logo">

            <div class="game-info">
                <span class="game-name">${juego.nombre}</span>
            </div>

            <button class="fav-star ${favoritos.includes(juego.nombre) ? 'active' : ''}"
                onclick="toggleFav('${juego.nombre}', event)">
                ${favoritos.includes(juego.nombre) ? '★' : '☆'}
            </button>

            <button class="play-btn" onclick="abrirJuego('${juego.url}')">
                PLAY
            </button>
        `;

        cont.appendChild(div);
    });

    document.getElementById("contador").textContent =
        "NÚMERO DE JUEGOS: " + lista.length;
}

/* BUSCADOR */
function buscar() {
    const txt = document.getElementById("searchInput").value.toLowerCase();
    const filtrados = juegosRaw.filter(j =>
        j.nombre.toLowerCase().includes(txt)
    );
    renderJuegos(filtrados);
}

/* CATEGORIES */
function filtrar(cat) {
    if (cat === "ALL") return renderJuegos();
    const filtrados = juegosRaw.filter(j => j.categoria === cat);
    renderJuegos(filtrados);
}

/* RELOJ */
setInterval(() => {
    document.getElementById("clock").textContent =
        new Date().toLocaleTimeString();
}, 1000);

/* INICI */
renderJuegos();

</script>

</body>
